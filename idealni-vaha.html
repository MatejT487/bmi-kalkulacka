<!DOCTYPE html>
<html>
<head>

<title>Kalkulačka ideální váhy</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f5f5f5;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Kalkulačka ideální váhy</h1>

<p>
Spočítejte si svou ideální váhu podle výšky.
</p>

<input type="number" id="height" placeholder="Výška (cm)"><br><br>

<button onclick="calculateWeight()">Spočítat</button>

<p id="result"></p>

<script>

function calculateWeight(){

let height = document.getElementById("height").value;

let idealMin = 18.5 * (height/100) * (height/100);
let idealMax = 24.9 * (height/100) * (height/100);

document.getElementById("result").innerHTML =
"Ideální váha: " +
Math.round(idealMin) + " – " +
Math.round(idealMax) + " kg";

}

</script>

</body>
</html>
