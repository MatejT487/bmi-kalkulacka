<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka ideální váhy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Ideální váha</h1>

    <div class="input-group">
        <label>Výška (cm)</label>
        <input type="number" id="height" placeholder="Např. 180">
    </div>

    <button onclick="calculateIdealWeight()">Spočítat ideální váhu</button>

    <div class="result" id="result" style="color: #555;">
        Zadej výšku a zjisti svou ideální váhu ⚖️
    </div>
</div>

<script>
function calculateIdealWeight() {
    let height = document.getElementById("height").value;

    if (height === "") {
        document.getElementById("result").style.color = "#555";
        document.getElementById("result").innerText = "Vyplň všechny údaje.";
        return;
    }

    let min = 18.5 * (height / 100) * (height / 100);
    let max = 24.9 * (height / 100) * (height / 100);

    min = parseFloat(min.toFixed(1));
    max = parseFloat(max.toFixed(1));

    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerHTML =
        `<strong>Ideální váha ⚖️</strong><br><br>
         <span style="color: green;"><strong>Rozmezí:</strong> <strong>${min} – ${max}</strong> kg</span>
         <br><br><small style="color:#666;">Hodnoty vycházejí z BMI 18.5–24.9</small>`;
}
</script>

</body>
</html>
