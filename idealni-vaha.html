<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideální váha</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #795548;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #5d4037;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Ideální váha</h1>

    <input type="number" id="height" placeholder="Výška (cm)">

    <button onclick="calculateIdealWeight()">Spočítat</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateIdealWeight() {
    let height = document.getElementById("height").value;

    if (!height) {
        document.getElementById("result").innerHTML = "Zadej výšku!";
        return;
    }

    let min = 18.5 * (height/100) * (height/100);
    let max = 24.9 * (height/100) * (height/100);

    min = min.toFixed(1);
    max = max.toFixed(1);

    document.getElementById("result").innerHTML =
        `Ideální váha: ${min} – ${max} kg`;
}
</script>

</body>
</html>
