<!DOCTYPE html>
<html>
<head>

<title>BMI Kalkulačka</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f5f5f5;
}
input{
padding:10px;
margin:5px;
}
button{
padding:10px 20px;
font-size:16px;
}
</style>

</head>

<body>

<h1>BMI Kalkulačka</h1>
  <p>
BMI kalkulačka slouží k výpočtu indexu tělesné hmotnosti (Body Mass Index).
Pomocí BMI lze jednoduše zjistit, zda má člověk podváhu, normální váhu,
nadváhu nebo obezitu. Zadejte svou výšku a váhu a kalkulačka okamžitě
spočítá váš BMI index.
</p>

<label>Výška (cm):</label>
<input type="number" id="height"><br><br>

<label>Váha (kg):</label>
<input type="number" id="weight"><br><br>

<button onclick="calculateBMI()">Spočítat BMI</button>

<p id="result"></p>

<script>

function calculateBMI() {

let height = document.getElementById("height").value;
let weight = document.getElementById("weight").value;

let bmi = weight / ((height/100) * (height/100));

let category = "";

if (bmi < 18.5) {
category = "Podváha";
} else if (bmi < 25) {
category = "Normální váha";
} else if (bmi < 30) {
category = "Nadváha";
} else {
category = "Obezita";
}

document.getElementById("result").innerText =
"Tvoje BMI je: " + bmi.toFixed(2) + " (" + category + ")";

}

</script>

</body>
</html>
