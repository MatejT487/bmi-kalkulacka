<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Kalkulačka</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KARTA */
.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

    .input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

/* INPUTY */
input {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #45a049;
}

/* VÝSLEDEK */
.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
}

/* BAR */
.bar {
    height: 10px;
    border-radius: 10px;
    margin-top: 15px;
    background: linear-gradient(to right, blue, green, orange, red);
}
</style>
</head>

<body>

<div class="container">
    <h1>BMI Kalkulačka</h1>

    <div class="input-group">
  <label for="height">Výška (cm)</label>
  <input type="number" id="height" placeholder="Např. 180">
</div>

<div class="input-group">
  <label for="weight">Váha (kg)</label>
  <input type="number" id="weight" placeholder="Např. 75">
</div>

    <button onclick="calculateBMI()">Spočítat BMI</button>

    <div class="result" id="result">Zadej údaje a klikni na tlačítko</div>
    <div class="bar"></div>
</div>

<script>
function calculateBMI() {
  let height = document.getElementById("height").value;
  let weight = document.getElementById("weight").value;

  if (height === "" || weight === "") {
  document.getElementById("result").style.color = "black";
  document.getElementById("result").innerText = "Vyplň všechny údaje.";
  return;
}

  let bmi = weight / ((height / 100) ** 2);
  bmi = parseFloat(bmi.toFixed(1));

  let message = "";

if (bmi < 18.5) {
  message = "Podváha – zvaž zvýšení příjmu kalorií.";
} else if (bmi < 25) {
  message = "Normální váha – skvělá práce 👍";
} else if (bmi < 30) {
  message = "Nadváha – můžeš lehce upravit jídelníček.";
} else {
  message = "Obezita – doporučujeme zaměřit se na zdravý životní styl.";
}
    
    let color = "";

if (bmi < 18.5) {
  color = "blue";
} else if (bmi < 25) {
  color = "green";
} else if (bmi < 30) {
  color = "orange";
} else {
  color = "red";
}

    let bar = document.querySelector(".bar");

if (bmi < 18.5) {
  bar.style.background = "blue";
} else if (bmi < 25) {
  bar.style.background = "green";
} else if (bmi < 30) {
  bar.style.background = "orange";
} else {
  bar.style.background = "red";
}

document.getElementById("result").style.color = color;

  document.getElementById("result").innerHTML = 
  `Tvoje BMI je <strong>${bmi}</strong><br>${message}<br><small>Ideální rozmezí je 18.5 – 24.9</small>`
}
</script>

</body>
</html>
