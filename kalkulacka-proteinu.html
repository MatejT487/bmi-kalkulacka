<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka proteinů</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #9c27b0;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #7b1fa2;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka proteinů</h1>

    <input type="number" id="weight" placeholder="Váha (kg)">

    <select id="goal">
        <option value="1.2">Udržování</option>
        <option value="1.6">Lehké nabírání</option>
        <option value="2.0">Nabírání svalů</option>
        <option value="2.2">Rýsování</option>
    </select>

    <button onclick="calculateProtein()">Spočítat proteiny</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateProtein() {
    let weight = document.getElementById("weight").value;
    let goal = document.getElementById("goal").value;

    if (!weight) {
        document.getElementById("result").innerHTML = "Zadej váhu!";
        return;
    }

    let protein = weight * goal;
    protein = Math.round(protein);

    document.getElementById("result").innerHTML =
        `Denní příjem proteinů: ${protein} g`;
}
</script>

</body>
</html>
