<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka proteinů</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
}

    .helper-link {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
    line-height: 1.5;
}

.helper-link a {
    color: #2e7d32;
    font-weight: 600;
    text-decoration: none;
}

.helper-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka proteinů</h1>

    <div class="input-group">
        <label>Váha (kg)</label>
        <input type="number" id="weight" placeholder="Např. 75">
    </div>

    <div class="input-group">
        <label>Cíl</label>
        <select id="goal">
            <option value="1.6">Udržení</option>
            <option value="2.0">Hubnutí</option>
            <option value="2.2">Nabírání svalů</option>
        </select>
    </div>

    <button onclick="calculateProtein()">Spočítat proteiny</button>

    <p class="helper-link">
    Nevíš, kolik proteinů denně potřebuješ?
    <a href="kolik-proteinu-denne.html">Přečti si krátký článek</a>
</p>

    <div class="result" id="result" style="color: #555;">
        Vyplň údaje a zjisti svůj denní příjem 💪
    </div>
</div>

<script>
function calculateProtein() {
  let weight = document.getElementById("weight").value;
  let goal = parseFloat(document.getElementById("goal").value);

  if (weight === "") {
    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerText = "Vyplň všechny údaje.";
    return;
  }

  let protein = Math.round(weight * goal);

  let goalText = "";
  if (goal === 1.6) {
    goalText = "Udržení";
  } else if (goal === 2.0) {
    goalText = "Hubnutí";
  } else {
    goalText = "Nabírání svalů";
  }

  document.getElementById("result").style.color = "#555";
document.getElementById("result").innerHTML =
  `<strong>Denní příjem proteinů 💪</strong><br><br>

   <span style="color: green;">
     <strong>${goalText}:</strong> <strong>${protein}</strong> g
   </span>

   <br><br><small style="color:#666;">≈ ${goal} g / kg • Hodnoty jsou orientační</small>`;
}
</script>

</body>
</html>
