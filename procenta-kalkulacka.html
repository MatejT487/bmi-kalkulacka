<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka procent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.section-title {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: 600;
    text-align: left;
    color: #333;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
}

.divider {
    height: 1px;
    background: #e5e5e5;
    margin: 25px 0 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka procent</h1>

    <div class="section-title">1. Kolik je X % z Y</div>

    <div class="input-group">
        <label>Procenta (%)</label>
        <input type="number" id="percent" placeholder="Např. 20">
    </div>

    <div class="input-group">
        <label>Z čísla</label>
        <input type="number" id="base" placeholder="Např. 1500">
    </div>

    <button onclick="calculatePercent()">Spočítat procenta</button>

    <div class="divider"></div>

    <div class="section-title">2. O kolik % se změnila hodnota</div>

    <div class="input-group">
        <label>Původní hodnota</label>
        <input type="number" id="oldValue" placeholder="Např. 1000">
    </div>

    <div class="input-group">
        <label>Nová hodnota</label>
        <input type="number" id="newValue" placeholder="Např. 1250">
    </div>

    <button onclick="calculateChange()">Spočítat změnu</button>

    <div class="result" id="result" style="color: #555;">
        Zadej údaje a zjisti výsledek 📊
    </div>
</div>

<script>
function calculatePercent() {
    let percent = document.getElementById("percent").value;
    let base = document.getElementById("base").value;

    if (percent === "" || base === "") {
        document.getElementById("result").style.color = "#555";
        document.getElementById("result").innerText = "Vyplň všechny údaje pro první výpočet.";
        return;
    }

    let result = (percent / 100) * base;
    result = parseFloat(result.toFixed(2));

    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerHTML =
        `<strong>Výsledek procent 📊</strong><br><br>
         <span style="color: green; font-size: 22px;">
           <strong>${result}</strong>
         </span>
         <br><small style="color:#666;">${percent} % z ${base}</small>`;
}

function calculateChange() {
    let oldValue = document.getElementById("oldValue").value;
    let newValue = document.getElementById("newValue").value;

    if (oldValue === "" || newValue === "") {
        document.getElementById("result").style.color = "#555";
        document.getElementById("result").innerText = "Vyplň všechny údaje pro druhý výpočet.";
        return;
    }

    if (parseFloat(oldValue) === 0) {
        document.getElementById("result").style.color = "#555";
        document.getElementById("result").innerText = "Původní hodnota nesmí být 0.";
        return;
    }

    let change = ((newValue - oldValue) / oldValue) * 100;
    change = parseFloat(change.toFixed(2));

    let text = "";
    let color = "";
    let icon = "";

    if (change > 0) {
        text = `Nárůst o ${change} %`;
        color = "green";
        icon = "📈";
    } else if (change < 0) {
        text = `Pokles o ${Math.abs(change)} %`;
        color = "red";
        icon = "📉";
    } else {
        text = "Žádná změna (0 %)";
        color = "#555";
        icon = "➖";
    }

    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerHTML =
        `<strong>Změna hodnoty ${icon}</strong><br><br>
         <span style="color: ${color}; font-size: 22px;">
           <strong>${text}</strong>
         </span>
         <br><br><small style="color:#666;">Porovnání ${oldValue} → ${newValue}</small>`;
}
</script>

</body>
</html>
