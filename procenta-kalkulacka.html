<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka procent</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #607d8b;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #455a64;
}

.result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka procent</h1>

    <input type="number" id="value" placeholder="Kolik je X">
    <input type="number" id="percent" placeholder="Kolik %">

    <button onclick="calculatePercent()">Spočítat</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculatePercent() {
    let value = document.getElementById("value").value;
    let percent = document.getElementById("percent").value;

    if (!value || !percent) {
        document.getElementById("result").innerHTML = "Vyplň všechna pole!";
        return;
    }

    let result = (value * percent) / 100;
    result = result.toFixed(2);

    document.getElementById("result").innerHTML =
        `${percent}% z ${value} je ${result}`;
}
</script>

</body>
</html>
