<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka vody</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
}

    .helper-link {
    margin-top: 18px;
    font-size: 14px;
    color: #666;
    line-height: 1.5;
}

.helper-link a {
    color: #2e7d32;
    font-weight: 600;
    text-decoration: none;
}

.helper-link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka vody</h1>

    <div class="input-group">
        <label>Váha (kg)</label>
        <input type="number" id="weight" placeholder="Např. 75">
    </div>

    <div class="input-group">
        <label>Aktivita</label>
        <select id="activity">
            <option value="1">Nízká aktivita</option>
            <option value="1.2">Střední aktivita</option>
            <option value="1.4">Vysoká aktivita</option>
        </select>
    </div>

    <button onclick="calculateWater()">Spočítat vodu</button>

    <p class="helper-link">
    Nevíš, kolik vody denně pít?
    <a href="kolik-vody-denne-pit.html">Přečti si krátký článek</a>
</p>

    <div class="result" id="result" style="color: #555;">
        Vyplň údaje a zjisti svůj denní příjem vody 💧
    </div>
</div>

<script>
function calculateWater() {
    let weight = document.getElementById("weight").value;
    let activity = parseFloat(document.getElementById("activity").value);

    if (weight === "") {
        document.getElementById("result").style.color = "#555";
        document.getElementById("result").innerText = "Vyplň všechny údaje.";
        return;
    }

    let water = weight * 0.035 * activity;
    water = parseFloat(water.toFixed(1));

    let glasses = Math.round((water * 1000) / 250);

    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerHTML =
        `<strong>Denní příjem vody 💧</strong><br><br>
         <span style="color: green;"><strong>Voda:</strong> <strong>${water}</strong> l</span>
         <br><br><small style="color:#666;">≈ ${glasses} sklenic • Hodnoty jsou orientační</small>`;
}
</script>

</body>
</html>
