<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka vody</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #03a9f4;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0288d1;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka vody</h1>

    <input type="number" id="weight" placeholder="Váha (kg)">

    <select id="activity">
        <option value="1">Nízká aktivita</option>
        <option value="1.2">Střední aktivita</option>
        <option value="1.4">Vysoká aktivita</option>
    </select>

    <button onclick="calculateWater()">Spočítat vodu</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateWater() {
    let weight = document.getElementById("weight").value;
    let activity = document.getElementById("activity").value;

    if (!weight) {
        document.getElementById("result").innerHTML = "Zadej váhu!";
        return;
    }

    let water = weight * 0.035 * activity;
    water = water.toFixed(2);

    document.getElementById("result").innerHTML =
        `Denní příjem vody: ${water} litrů`;
}
</script>

</body>
</html>
