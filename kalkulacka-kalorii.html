<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka kalorií</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* KARTA */
.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

/* INPUTY */
input, select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #ff5722;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #e64a19;
}

/* VÝSLEDEK */
.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka kalorií</h1>

    <input type="number" id="age" placeholder="Věk">
    <input type="number" id="height" placeholder="Výška (cm)">
    <input type="number" id="weight" placeholder="Váha (kg)">

    <select id="gender">
        <option value="male">Muž</option>
        <option value="female">Žena</option>
    </select>

    <select id="activity">
        <option value="1.2">Sedavý život</option>
        <option value="1.375">Lehká aktivita</option>
        <option value="1.55">Střední aktivita</option>
        <option value="1.725">Vysoká aktivita</option>
        <option value="1.9">Velmi vysoká aktivita</option>
    </select>

    <button onclick="calculateCalories()">Spočítat kalorie</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculateCalories() {
    let age = document.getElementById("age").value;
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weight").value;
    let gender = document.getElementById("gender").value;
    let activity = document.getElementById("activity").value;

    if (!age || !height || !weight) {
        document.getElementById("result").innerHTML = "Vyplň všechna pole!";
        return;
    }

    let bmr;

    if (gender === "male") {
        bmr = 10 * weight + 6.25 * height - 5 * age + 5;
    } else {
        bmr = 10 * weight + 6.25 * height - 5 * age - 161;
    }

    let calories = bmr * activity;
    calories = Math.round(calories);

    document.getElementById("result").innerHTML =
        `Denní příjem kalorií: ${calories} kcal`;
}
</script>

</body>
</html>
