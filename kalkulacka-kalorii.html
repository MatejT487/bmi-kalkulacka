<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulačka kalorií</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

h1 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

.result {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h1>Kalkulačka kalorií</h1>

    <div class="input-group">
        <label>Věk</label>
        <input type="number" id="age" placeholder="Např. 25">
    </div>

    <div class="input-group">
        <label>Výška (cm)</label>
        <input type="number" id="height" placeholder="Např. 180">
    </div>

    <div class="input-group">
        <label>Váha (kg)</label>
        <input type="number" id="weight" placeholder="Např. 75">
    </div>

    <div class="input-group">
        <label>Pohlaví</label>
        <select id="gender">
            <option value="male">Muž</option>
            <option value="female">Žena</option>
        </select>
    </div>

    <div class="input-group">
        <label>Aktivita</label>
        <select id="activity">
            <option value="1.2">Sedavý život</option>
            <option value="1.375">Lehká aktivita</option>
            <option value="1.55">Střední aktivita</option>
            <option value="1.725">Vysoká aktivita</option>
        </select>
    </div>

    <button onclick="calculateCalories()">Spočítat kalorie</button>

    <div class="result" id="result" style="color: #555;">
        Vyplň údaje a zjisti svůj denní příjem 🔥
    </div>
</div>

<script>
function calculateCalories() {
  let age = document.getElementById("age").value;
  let height = document.getElementById("height").value;
  let weight = document.getElementById("weight").value;
  let gender = document.getElementById("gender").value;
  let activity = document.getElementById("activity").value;

  if (age === "" || height === "" || weight === "") {
    document.getElementById("result").style.color = "#555";
    document.getElementById("result").innerText = "Vyplň všechny údaje.";
    return;
  }

  let bmr;

  if (gender === "male") {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }

  let maintain = Math.round(bmr * activity);
  let lose = maintain - 300;
  let gain = maintain + 300;

  document.getElementById("result").style.color = "#555";
  document.getElementById("result").innerHTML =
    `<strong>Denní příjem kalorií 🔥</strong><br><br>
     <span style="color: green;"><strong>Udržení:</strong> <strong>${maintain}</strong> kcal</span><br><br>
     <span style="color: blue;"><strong>Hubnutí:</strong> <strong>${lose}</strong> kcal</span><br><br>
     <span style="color: red;"><strong>Nabírání:</strong> <strong>${gain}</strong> kcal</span>
     <br><br><small style="color:#666;">Hodnoty jsou orientační</small>`;
}
</script>

</body>
</html>
